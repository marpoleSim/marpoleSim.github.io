---
layout: default
---

<h1>{{ page.title }}</h1>

{{ content }}

<ul>
  {% for post in site.posts %}
    <li style="margin-bottom: 0.25em;">
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a> &nbsp;&nbsp;&nbsp;
      <small>{{ post.date | date: "%Y-%m-%d" }}</small>
    </li>
  {% endfor %}
</ul>
