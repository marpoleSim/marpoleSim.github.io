---
layout: default
---

<article class="post">

  <h1>{{ page.title }}</h1>
  <p>{{ page.date | date: "%Y-%m-%d" }}</p>

  <div class="post-content">
    {{ content }}
  </div>

  <!-- 👇 CUSTOM POST FOOTER -->
  <hr>
  <div class="post-footer">
    <p>
      <a href="/blog/">← Back to Blog</a>
    </p>
  </div>

</article>
